<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Creative Login</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
      background-color: #f8fafc; /* Soothing soft gray */
    }

    #loginContainer {
      background: #ffffff;
      padding: 40px 35px;
      border-radius: 16px;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
      border: 1px solid #e2e8f0;
      width: 100%;
      max-width: 360px;
      box-sizing: border-box;
      text-align: center;
    }

    h2 {
      margin: 0 0 25px;
      font-size: 24px;
      font-weight: 600;
      color: #0f172a;
    }

    .input-group {
      margin-bottom: 20px;
      text-align: left;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-size: 13px;
      font-weight: 500;
      color: #475569;
    }

    .password-wrapper {
      position: relative;
      display: flex;
      align-items: center;
    }

    input {
      width: 100%;
      padding: 12px 14px;
      border: 1px solid #cbd5e1;
      border-radius: 8px;
      outline: none;
      background: #ffffff;
      color: #0f172a;
      font-size: 15px;
      box-sizing: border-box;
      transition: all 0.2s ease;
    }

    input::placeholder {
      color: #94a3b8;
    }

    input:focus {
      border-color: #3b82f6;
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15);
    }

    .eye-icon {
      position: absolute;
      right: 14px;
      cursor: pointer;
      user-select: none;
      color: #64748b;
    }

    button {
      width: 100%;
      padding: 13px;
      border: none;
      border-radius: 8px;
      background: #1e293b; /* Premium slate gray */
      color: #ffffff;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.2s ease;
      margin-top: 10px;
    }

    button:hover {
      background: #0f172a;
    }

    #notification {
      display: none;
      margin-top: 20px;
      padding: 12px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      text-align: left;
    }

    .error-msg {
      background: #fef2f2;
      border: 1px solid #fca5a5;
      color: #991b1b;
    }

    .success-msg {
      background: #f0fdf4;
      border: 1px solid #86efac;
      color: #166534;
    }

    .link {
      margin-top: 25px;
      font-size: 13px;
      color: #64748b;
    }

    .link a {
      color: #3b82f6;
      text-decoration: none;
      font-weight: 500;
    }

    .link a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div id="loginContainer">
    <h2>Welcome Back Screen</h2>
    <form id="loginForm">
      <div class="input-group">
        <label for="username">Username</label>
        <input type="text" id="username" placeholder="Enter username" required>
      </div>

      <div class="input-group">
        <label for="email">Gmail ID</label>
        <input type="email" id="email" placeholder="Enter Gmail ID" required>
      </div>

      <div class="input-group">
        <label for="password">Password</label>
        <div class="password-wrapper">
          <input type="password" id="password" placeholder="Enter password" required>
          <span id="togglePassword" class="eye-icon">👁️</span>
        </div>
      </div>

      <button type="submit">Login</button>
    </form>
    
    <div id="notification"></div>
    
    <div class="link">
      <a href="task.html">View Assignment Form Screen →</a>
    </div>
  </div>

  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const loginForm = document.getElementById("loginForm");
      const togglePassword = document.getElementById("togglePassword");
      const passwordInput = document.getElementById("password");
      const note = document.getElementById("notification");

      togglePassword.addEventListener("click", () => {
        const type = passwordInput.getAttribute("type") === "password" ? "text" : "password";
        passwordInput.setAttribute("type", type);
        togglePassword.textContent = type === "password" ? "👁️" : "🙈";
      });

      loginForm.addEventListener("submit", (e) => {
        e.preventDefault();
        const user = document.getElementById("username").value.trim();
        const email = document.getElementById("email").value.trim();
        const pass = passwordInput.value.trim();
        const gmailPattern = /^[a-zA-Z0-9._%+-]+@gmail\.com$/;

        if (!user) {
          showNotification("⚠ Username cannot be empty!", "error");
        } else if (!gmailPattern.test(email)) {
          showNotification("⚠ Please enter a valid Gmail ID!", "error");
        } else if (pass.length < 6) {
          showNotification("⚠ Password must be at least 6 characters!", "error");
        } else {
          showNotification("✔ Login successful! Redirecting...", "success");
          setTimeout(() => {
            window.location.href = "dashboard.html";
          }, 1500);
        }
      });

      function showNotification(message, type) {
        note.innerText = message;
        note.style.display = "block";
        note.className = type === "error" ? "error-msg" : "success-msg";
      }
    });
  </script>
</body>
</html>
