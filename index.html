<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Creative Login</title>
  <!-- Link external stylesheet -->
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="loginContainer">
    <h2>Welcome Back ✨</h2>
    <form id="loginForm">
      <div class="input-group">
        <label for="username">Username</label>
        <input type="text" id="username" placeholder="Enter username" required>
      </div>

      <div class="input-group">
        <label for="email">Gmail ID</label>
        <input type="email" id="email" placeholder="Enter Gmail ID" required>
      </div>

      <div class="input-group">
        <label for="password">Password</label>
        <div class="password-wrapper">
          <input type="password" id="password" placeholder="Enter password" required>
          <span id="togglePassword" class="eye-icon">👁️</span>
        </div>
      </div>

      <!-- Type changed to submit for better accessibility -->
      <button type="submit">Login</button>
    </form>
    
    <div id="notification"></div>
    
    <div class="link">
      <a href="#">Forgot Password?</a> | <a href="task.html">View Task Page</a>
    </div>
  </div>

  <!-- Link external JavaScript logic -->
  <script src="js/script.js"></script>
</body>
</html>
