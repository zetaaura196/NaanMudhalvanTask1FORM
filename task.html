<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Creative Form Task</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
      background-color: #f8fafc;
    }

    #formContainer {
      background: #ffffff;
      padding: 40px 35px;
      border-radius: 16px;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
      border: 1px solid #e2e8f0;
      width: 100%;
      max-width: 400px;
      box-sizing: border-box;
    }

    h2 {
      margin: 0 0 25px;
      text-align: center;
      font-size: 24px;
      font-weight: 600;
      color: #0f172a;
      transition: color 0.3s ease;
    }

    .input-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-size: 13px;
      font-weight: 500;
      color: #475569;
      transition: all 0.3s ease;
    }

    .required::after {
      content: " *";
      color: #ef4444;
    }

    input {
      width: 100%;
      padding: 12px 14px;
      border: 1px solid #cbd5e1;
      border-radius: 8px;
      outline: none;
      background: #ffffff;
      color: #0f172a;
      font-size: 15px;
      box-sizing: border-box;
      transition: all 0.2s ease;
    }

    input::placeholder {
      color: #94a3b8;
    }

    input:focus {
      border-color: #3b82f6;
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15);
    }

    input.highlighted {
      background-color: #fef9c3 !important;
      border-color: #eab308 !important;
    }

    button {
      width: 100%;
      padding: 13px;
      border: none;
      border-radius: 8px;
      background: #1e293b;
      color: #ffffff;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.2s ease;
      margin-top: 10px;
    }

    button:hover {
      background: #0f172a;
    }

    .btn-secondary {
      background: transparent;
      color: #475569;
      border: 1px solid #cbd5e1;
      margin-top: 12px;
    }

    .btn-secondary:hover {
      background: #f1f5f9;
      color: #0f172a;
    }

    .styledLabel {
      font-weight: 700 !important;
      font-style: italic;
      color: #ef4444 !important;
    }

    #notification {
      display: none;
      margin-top: 20px;
      padding: 12px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      background: #f0fdf4;
      border: 1px solid #86efac;
      color: #166534;
    }

    .link {
      margin-top: 25px;
      text-align: center;
      font-size: 13px;
    }

    .link a {
      color: #3b82f6;
      text-decoration: none;
      font-weight: 500;
    }

    .link a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>

  <div id="formContainer">
    <h2 id="formHeading">User Form Dashboard</h2>
    
    <form id="myForm" onsubmit="handleFormSubmit(event)">
      <div class="input-group">
        <label for="name" class="required">Name</label>
        <input type="text" id="name" placeholder="Enter name" required>
      </div>

      <div class="input-group">
        <label for="email" class="required">Email</label>
        <input type="email" id="email" placeholder="Enter email" required>
      </div>

      <div class="input-group">
        <label for="age">Age</label>
        <input type="number" id="age" placeholder="Enter age (optional)">
      </div>

      <button type="submit">Submit Form Data</button>
      <button type="button" class="btn-secondary" onclick="toggleLabelStyle()">Toggle Bold Style</button>
    </form>

    <div id="notification">✔ Form submitted successfully!</div>
    
    <div class="link">
      <a href="index.html">← Back to Login Screen</a>
    </div>
  </div>

  <script>
    function handleFormSubmit(event) {
      event.preventDefault();

      document.getElementById("name").classList.add("highlighted");
      document.getElementById("email").classList.add("highlighted");

      document.getElementById("formHeading").style.color = "#3b82f6";
      document.getElementById("formContainer").style.borderColor = "#3b82f6";

      let labels = document.getElementsByTagName("label");
      for (let i = 0; i < labels.length; i++) {
        labels[i].style.fontWeight = "bold";
      }

      let note = document.getElementById("notification");
      note.style.display = "block";
      
      setTimeout(() => {
        window.location.href = "dashboard.html";
      }, 2000);
    }

    function toggleLabelStyle() {
      let labels = document.getElementsByTagName("label");
      for (let i = 0; i < labels.length; i++) {
        labels[i].classList.toggle("styledLabel");
      }
    }
  </script>
</body>
</html>
